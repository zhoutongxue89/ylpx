<!DOCTYPE html>

    <title>周同学的原理剖析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

        .card-title {
